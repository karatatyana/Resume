<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Interactive Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Видео интро -->
<div class="intro">
  <video id="introVideo" muted playsinline>
    <source src="assets/intro.mp4" type="video/mp4">
  </video>

  <div class="loader">
    <p class="loading-label">Загружаем портфолио<span class="dots"></span></p>
    <div class="progress-bar">
      <div class="progress"></div>
    </div>
    <p class="progress-text">0%</p>
  </div>
</div>

<!-- Главная сцена -->
<div class="scene hidden">
  <img src="assets/scene.png" class="background">
   <canvas id="dust"></canvas>
  <div class="dark-overlay"></div>
 

  <!-- Интерактивные зоны -->
  <div class="hotspot computer" data-type="portfolio"></div>
  <div class="hotspot frame" data-type="resume"></div>
  <div class="hotspot phone" data-type="contacts"></div>
</div>

<!-- Модальное окно -->
<div class="modal hidden">
  <div class="modal-content"></div>
  <button class="close">×</button>
</div>

<script src="script.js"></script>
</body>
</html>
